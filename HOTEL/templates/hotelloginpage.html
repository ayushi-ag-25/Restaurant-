<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1 {
            font-family: gabriola;
            font-size: 50px;
            text-align: center;
        }

        * {
            margin: 0;
            padding: 0;
        }

        body {
            background-color: rgb(209, 235, 235);
            font-family: sans-serif;
        }

        .page {
            max-width: 500px;
            margin: 20px auto;
            background-color: white;
            border-radius: 20px;
            padding: 50px;
        }

        .boxes {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            ;
            flex-direction: column;

        }

        input {
            padding: 10px;
            margin: 10px;
        }

        .boxes div{
            background-color: aliceblue;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
        }

        .sign {
            display: none;
        }

        .goto {
            text-align: center;
            font-weight: bold;
        }

        .change {
            font-family: forte;
            color: blue;
            font-size: 18px;
            cursor: pointer;
            background-color: transparent;
            border: 0;
        }

        .btn {
            margin-top: 10px;
            padding: 10px;
            width: 100px;
            border-radius: 20px;
            border: transparent;
            color: white;
            font-size: 28px;
            font-family: gabriola;
            background: linear-gradient(rgb(90, 218, 218), rgb(143, 139, 139));
        }

        #message {
            color:red;
            font-size:10px;
        }

        .animate{
            animation:oj 3s linear forwards;
            animation-delay: 2s;
        }
        @keyframe oj{
            to{opacity:0}
        }
    </style>
</head>

<body>
    <div class="page">
        <h1>Be a part of best bliss family🪄</h1>
        <div class="boxes">
            <div class="log box">
                <form method="POST" action="/check">
                    <label for="username1">Username:</label>
                    <input type="text" name='username1' id="username1" placeholder="Mobile no."><br>
                    <label for="pass1">Password:</label>
                    <input type="password" name='pass1' id="pass1" placeholder="password"><br>
                    <p id="message">{{mes}}</p>
                    <input type="submit" class="login btn" value="Login">
                </form>
                <p class="goto">Didn't have an account? <button onclick='sin()' class="change">Register</button></p>
            </div>
            <div class="sign box">
                <form method="POST" action="/add">
                    <label for="name">Name:</label>
                    <input type="text" name='nam' id="name" placeholder="what would you like to be called?"><br>
                    <label for="username2">Mobile:</label>
                    <input type="text" id="username2" name='username2' placeholder="Mobile no."><br>
                    <label for="pass2">Password:</label>
                    <input type="pass" id="pass2"  name='pass2' placeholder="set a password"><br>
                    
                    <input type="submit" class="login btn" value="Register">
                </form>
                <p class="goto">Already have an account? <button onclick='logi()' class="change">Login</button></p>
            </div>
        </div>
    </div>
</body>
<script>
    mess = document.getElementById('message');
    if (mess.textContent) {
       setTimeout(
        ()=>{mess.style.display='none'},2000
       )
    }

    function sin() {
        console.log('hgvbnm');
        document.querySelector('.log').style.display = 'none';
        document.querySelector('.sign').style.display = 'block'
    }
    function logi() {
        document.querySelector('.sign').style.display = 'none';
        document.querySelector('.log').style.display = 'block';
    }
</script>

</html>
